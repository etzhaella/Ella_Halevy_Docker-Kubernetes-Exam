version: "3.9"

services:
  web:
    build: ./fe
    container_name: fe-app
    ports:
      - "5002:5002"
    environment:
      BACKEND_URL: "http://backend-service:5001"
    depends_on:
      - backend-service
    networks:
      - crypto-net

  backend-service:
    build: ./be
    container_name: be-app
    ports:
      - "5001:5001"
    environment:
      MYSQL_HOST: mysqldb
      MYSQL_USER: root
      MYSQL_PASSWORD: 123456
    depends_on:
      - mysqldb
    networks:
      - crypto-net

  mysqldb:
    image: mysql:5.7
    container_name: mysql-crypto
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: crypto_db
    ports:
      - "3306:3306"
    networks:
      - crypto-net

networks:
  crypto-net:
    driver: bridge
