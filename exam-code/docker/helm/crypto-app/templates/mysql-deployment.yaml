apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysqldb
spec:
  replicas: {{ .Values.mysql.replicaCount }}
  selector:
    matchLabels:
      app: mysqldb
  template:
    metadata:
      labels:
        app: mysqldb
    spec:
      containers:
        - name: mysqldb
          image: "{{ .Values.mysql.image.repository }}:{{ .Values.mysql.image.tag }}"
          imagePullPolicy: {{ .Values.mysql.image.pullPolicy }}
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "{{ .Values.mysql.env.rootPassword }}"
            - name: MYSQL_DATABASE
              value: "{{ .Values.mysql.env.database }}"
            {{- if .Values.mysql.env.user }}
            - name: MYSQL_USER
              value: "{{ .Values.mysql.env.user }}"
            - name: MYSQL_PASSWORD
              value: "{{ .Values.mysql.env.password }}"
            {{- end }}
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          emptyDir: {}
